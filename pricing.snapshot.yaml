# GitHub Copilot CLI per-million-token pricing.
#
# Source: https://docs.github.com/en/copilot/reference/copilot-billing/models-and-pricing
# Fetched: 2026-04-28
# Effective: 2026-06-01 (usage-based billing)
#
# All prices are USD per 1,000,000 tokens.
# 1 AI credit = $0.01 USD.
#
# Anthropic models include a separate `cache_write` price (1.25x input).
# OpenAI / Google / xAI models have only `cached_input` (no separate write).
# Token attribute mapping (from the OTel exporter):
#   gen_ai.usage.input_tokens                    -> input + cache_read + cache_creation (Anthropic)
#                                                   or input + cache_read (OpenAI)
#   gen_ai.usage.output_tokens                   -> output (includes reasoning for OpenAI)
#   gen_ai.usage.cache_read.input_tokens         -> cache_read (subtract from input_tokens)
#   gen_ai.usage.cache_creation.input_tokens     -> cache_creation (Anthropic only; subtract too)
#   gen_ai.usage.reasoning.output_tokens         -> reasoning (subset of output_tokens; for reporting only)

